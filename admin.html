<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin — Librería Pereira</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Layout admin ─────────────────────────────── */
    .admin-header {
      background: linear-gradient(135deg, #1e1a17 0%, #3b2a20 100%);
      color: #fff;
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .admin-header h1 { font-size: 1.15rem; margin: 0; font-weight: 700; letter-spacing: 0.02em; }
    .admin-header p  { margin: 2px 0 0; font-size: 0.78rem; opacity: 0.7; }
    .badge-admin {
      background: var(--primario);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 99px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .admin-wrap {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 20px;
    }

    /* ── Barra acciones ───────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }
    .toolbar-left { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .search-input {
      padding: 9px 14px;
      border: 1.5px solid var(--borde);
      border-radius: 8px;
      background: var(--fondo-input);
      color: var(--texto);
      font-size: 0.88rem;
      width: 240px;
    }
    .search-input:focus { outline: none; border-color: var(--borde-focus); }
    .btn-add {
      padding: 9px 18px;
      background: linear-gradient(135deg, var(--primario), #c0392b);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.88rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-add:hover { opacity: 0.88; }
    .stat-chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .stat-chip {
      background: var(--fondo-card);
      border: 1px solid var(--borde);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.8rem;
      color: var(--texto-suave);
    }
    .stat-chip strong { color: var(--texto); }

    /* ── Tabla ────────────────────────────────────── */
    .table-wrap {
      background: var(--fondo-card);
      border: 1px solid var(--borde);
      border-radius: 14px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #f5ede6; }
    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 0.73rem;
      font-weight: 700;
      color: var(--texto-suave);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    td {
      padding: 13px 16px;
      font-size: 0.88rem;
      color: var(--texto);
      border-top: 1px solid var(--borde);
      vertical-align: middle;
    }
    tr:hover td { background: #fdf6f0; }
    .td-titulo { font-weight: 600; max-width: 200px; }
    .td-precio { font-weight: 700; color: var(--primario); }
    .td-stock  { font-weight: 600; }
    .stock-low  { color: #dc2626; }
    .stock-ok   { color: #16a34a; }
    .badge-genero {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 99px;
      font-size: 0.72rem;
      font-weight: 600;
      background: #f0e6dc;
      color: var(--primario-dark);
    }
    .td-acciones { display: flex; gap: 8px; }
    .btn-icon {
      border: none;
      border-radius: 7px;
      padding: 6px 11px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-icon:hover { opacity: 0.78; }
    .btn-edit   { background: #eff6ff; color: #1d4ed8; }
    .btn-delete { background: #fef2f2; color: #dc2626; }
    .btn-toggle { background: #f0fdf4; color: #16a34a; }
    .btn-toggle.inactive { background: #fef9c3; color: #92400e; }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--texto-suave);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

    /* ── Modal ────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(3px);
      z-index: 9000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-admin {
      background: var(--fondo-card);
      border-radius: 18px;
      padding: 32px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 60px rgba(0,0,0,0.25);
    }
    .modal-admin h3 {
      margin: 0 0 22px;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--texto);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .modal-admin .input-group { margin-bottom: 16px; }
    .modal-admin label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--texto-suave);
    }
    .modal-admin input,
    .modal-admin select,
    .modal-admin textarea {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid var(--borde);
      border-radius: 8px;
      background: var(--fondo-input);
      color: var(--texto);
      font-size: 0.88rem;
      font-family: inherit;
      box-sizing: border-box;
    }
    .modal-admin textarea { resize: vertical; min-height: 80px; }
    .modal-admin input:focus,
    .modal-admin select:focus,
    .modal-admin textarea:focus {
      outline: none;
      border-color: var(--borde-focus);
    }
    .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }
    .btn-cancel {
      flex: 1;
      padding: 11px;
      background: transparent;
      border: 1.5px solid var(--borde);
      border-radius: 8px;
      color: var(--texto-suave);
      font-weight: 600;
      cursor: pointer;
    }
    .btn-save {
      flex: 2;
      padding: 11px;
      background: linear-gradient(135deg, var(--primario), #c0392b);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-save:hover { opacity: 0.9; }

    /* ── Confirm delete ───────────────────────────── */
    .modal-confirm { max-width: 380px; text-align: center; }
    .modal-confirm .icon { font-size: 2.5rem; margin-bottom: 10px; }
    .modal-confirm p { color: var(--texto-suave); font-size: 0.9rem; margin: 8px 0 24px; }
    .btn-danger {
      flex: 1;
      padding: 11px;
      background: #dc2626;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ── Toast ────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 13px 20px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      color: #fff;
      z-index: 9999;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { background: #16a34a; }
    #toast.error   { background: #dc2626; }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 640px) {
      .modal-row { grid-template-columns: 1fr; }
      .search-input { width: 100%; }
      td, th { padding: 10px 10px; }
    }
    .field-error {
      display: block;
      font-size: 0.72rem;
      color: #e53e3e;
      margin-top: 4px;
      min-height: 0.9rem;
      opacity: 0;
      transform: translateY(-3px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .field-error.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .modal-admin input.invalid,
    .modal-admin select.invalid,
    .modal-admin textarea.invalid {
      border-color: #e53e3e !important;
      background-color: #fff5f5 !important;
    }
    .modal-admin input.valid,
    .modal-admin select.valid {
      border-color: #38a169 !important;
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-brand">Librería Pereira</a>
    <a href="index.html">Inicio</a>
    <a href="#" onclick="logout(); return false;" class="nav-cta">Cerrar sesión</a>
  </nav>

  <div class="session-bar" id="sessionBar" style="display:none;">
    <div class="session-dot"></div>
    Sesión activa · <span id="sessionCount">300s</span>
  </div>

  <div class="admin-header">
    <div>
      <h1>🛠️ Panel de Administración</h1>
      <p id="adminWelcome">Cargando...</p>
    </div>
    <span class="badge-admin">Administrador</span>
  </div>

  <div class="admin-wrap">

    <div id="alertAdmin"></div>

    <div class="toolbar">
      <div class="toolbar-left">
        <input class="search-input" type="search" id="searchLibros"
               placeholder="🔍 Buscar por título o autor..." oninput="filtrarTabla()">
        <div class="stat-chips">
          <div class="stat-chip">Total: <strong id="statTotal">—</strong></div>
          <div class="stat-chip">Stock bajo: <strong id="statBajo">—</strong></div>
          <div class="stat-chip">Agotados: <strong id="statOcultos">—</strong></div>
        </div>
      </div>
      <button class="btn-add" onclick="abrirModal()">＋ Agregar libro</button>
    </div>

    <div class="table-wrap">
      <table id="tablaLibros">
        <thead>
          <tr>
            <th>Título / Autor</th>
            <th>Género</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tbodyLibros">
          <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--texto-suave);">Cargando libros...</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <div id="toast"></div>

  <footer>
    <strong>Librería Pereira</strong> &copy; 2026 · Panel de Administración
  </footer>

  <script src="js/script.js"></script>
  <script>
// ── Proteger: administradores y root ───────────────────────────
    const sesion = requireSession();
    // Bloquear el acceso si el rol NO es ni administrador ni root
    if (sesion && sesion.rol !== 'administrador' && sesion.rol !== 'root') {
      alert('⛔ Acceso denegado. Esta sección es solo para personal autorizado.');
      window.location.href = 'index.html';
    }

    document.getElementById('adminWelcome').textContent =
      `Bienvenido, ${sesion?.nombre_completo || 'Admin'} · Gestión de catálogo`;

    document.getElementById('sessionBar').style.display = 'flex';
    initSessionTimer();

    // ── Estado global ─────────────────────────────────────────────
    let libros = [];
    let editandoId = null;

    // ── Cargar libros ─────────────────────────────────────────────
    async function cargarLibros() {
      const { data, error } = await client
        .from('libros')
        .select('*')
        .order('titulo', { ascending: true });

      if (error) {
        showAlert('alertAdmin', 'Error al cargar libros: ' + error.message, 'error');
        return;
      }
      libros = data || [];
      actualizarStats();
      renderTabla(libros);
    }

    function actualizarStats() {
      document.getElementById('statTotal').textContent   = libros.length;
      document.getElementById('statBajo').textContent    = libros.filter(l => (l.stock ?? 0) < 5).length;
      document.getElementById('statOcultos').textContent = libros.filter(l => l.agotado === true).length;
    }

    // ── Renderizar tabla ──────────────────────────────────────────
    function renderTabla(lista) {
      const tbody = document.getElementById('tbodyLibros');
      if (!lista.length) {
        tbody.innerHTML = `
          <tr><td colspan="6">
            <div class="empty-state">
              <div class="icon">📭</div>
              <p>No hay libros que coincidan con la búsqueda.</p>
            </div>
          </td></tr>`;
        return;
      }
      tbody.innerHTML = lista.map(l => {
        const stockClass = (l.stock ?? 0) < 5 ? 'stock-low' : 'stock-ok';
        const agotado    = l.agotado === true;
        const estadoLibroFisico = l.estado_libro ? l.estado_libro.charAt(0).toUpperCase() + l.estado_libro.slice(1) : 'Nuevo';
        
        return `
          <tr data-id="${l.id}">
            <td class="td-titulo">
              ${escHtml(l.titulo)}
              <div style="font-size:0.78rem;color:var(--texto-suave);font-weight:400;margin-top:2px;">
                ${escHtml(l.autor || '—')}
              </div>
            </td>
            <td><span class="badge-genero">${escHtml(l.genero || '—')}</span></td>
            <td class="td-precio">$${parseFloat(l.precio || 0).toLocaleString('es-CO', { minimumFractionDigits: 0 })}</td>
            <td class="td-stock ${stockClass}">${l.stock ?? 0}</td>
            <td>
              <span class="badge-genero" style="background:${agotado ? '#fef2f2' : '#dcfce7'};color:${agotado ? '#dc2626' : '#166534'};">
                ${agotado ? 'Agotado' : estadoLibroFisico}
              </span>
            </td>
            <td>
              <div class="td-acciones">
                <button class="btn-icon btn-edit"   onclick="abrirModal('${l.id}')">✏️ Editar</button>
                <button class="btn-icon btn-delete" onclick="confirmarEliminar('${l.id}', '${escAttr(l.titulo)}')">🗑️</button>
              </div>
            </td>
          </tr>`;
      }).join('');
    }

    // ── Filtro de búsqueda ────────────────────────────────────────
    function filtrarTabla() {
      const q = document.getElementById('searchLibros').value.toLowerCase().trim();
      if (!q) { renderTabla(libros); return; }
      const filtrado = libros.filter(l =>
        (l.titulo || '').toLowerCase().includes(q) ||
        (l.autor  || '').toLowerCase().includes(q)
      );
      renderTabla(filtrado);
    }

    // ── Modal CREAR / EDITAR ──────────────────────────────────────
    function abrirModal(id = null) {
      editandoId = id;
      const libro = id ? libros.find(l => l.id == id) : null;
      const titulo = libro ? '✏️ Editar libro' : '＋ Nuevo libro';

      // Obtenemos la fecha de hoy para bloquear fechas futuras
      const fechaHoy = new Date().toISOString().split('T')[0];

      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.id = 'modalLibro';
      overlay.innerHTML = `
        <div class="modal-admin">
          <h3>${titulo}</h3>
          <div class="modal-row">
            <div class="input-group">
              <label>Título *</label>
              <input type="text" id="mTitulo" placeholder="Ej: Cien años de soledad"
                     value="${escAttr(libro?.titulo || '')}">
              <span class="field-error" id="err-mTitulo"></span>
            </div>
            <div class="input-group">
              <label>Autor *</label>
              <input type="text" id="mAutor" placeholder="Ej: Gabriel García Márquez"
                     value="${escAttr(libro?.autor || '')}">
              <span class="field-error" id="err-mAutor"></span>
            </div>
          </div>
          <div class="modal-row">
            <div class="input-group">
              <label>Editorial</label>
              <input type="text" id="mEditorial" placeholder="Ej: Planeta"
                     value="${escAttr(libro?.editorial || '')}">
            </div>
            <div class="input-group">
              <label>Código único</label>
              <input type="text" id="mCodigo" placeholder="Ej: LP-2026-001"
                     value="${escAttr(libro?.codigo_unico || '')}">
            </div>
          </div>
          <div class="modal-row">
            <div class="input-group">
              <label>Género</label>
              <select id="mGenero">
                ${['','Novela','Cuento','Poesía','Ensayo','Historia','Ciencia','Infantil','Fantasía','Terror','Romance','Autoayuda','Biografía','Derecho','Educación','Arte','Otro']
                  .map(g => `<option value="${g}" ${(libro?.genero||'')==g?'selected':''}>${g||'Seleccionar...'}</option>`)
                  .join('')}
              </select>
            </div>
            <div class="input-group">
              <label>Idioma</label>
              <select id="mIdioma">
                ${['Español','Inglés']
                  .map(i => `<option value="${i}" ${(libro?.idioma||'Español')==i?'selected':''}>${i}</option>`)
                  .join('')}
              </select>
            </div>
          </div>
          <div class="modal-row">
            <div class="input-group">
              <label>ISBN</label>
              <input type="text" id="mIsbn" placeholder="978-xxxxxxxxxx"
                     value="${escAttr(libro?.isbn || '')}">
              <span class="field-error" id="err-mIsbn"></span>
            </div>
            <div class="input-group">
              <label>Número de páginas</label>
              <input type="number" id="mPaginas" min="1"
                     placeholder="Ej: 320" value="${libro?.numero_paginas || ''}">
            </div>
          </div>
          <div class="modal-row">
            <div class="input-group">
              <label>Fecha de publicación</label>
              <input type="date" id="mFechaPub" max="${fechaHoy}"
                     value="${libro?.fecha_publicacion || ''}">
              <span class="field-error" id="err-mFechaPub"></span>
            </div>
            <div class="input-group">
              <label>Condición del libro</label>
              <select id="mEstadoLibro">
                ${['nuevo','usado']
                  .map(e => {
                    const savedValue = (libro?.estado_libro || 'nuevo').toLowerCase();
                    const textoMostrar = e === 'nuevo' ? 'Nuevo' : 'Usado';
                    return `<option value="${e}" ${savedValue === e ? 'selected' : ''}>${textoMostrar}</option>`;
                  })
                  .join('')}
              </select>
            </div>
          </div>
          <div class="modal-row">
            <div class="input-group">
              <label>Precio (COP) *</label>
              <input type="number" id="mPrecio" min="0" step="500"
                     placeholder="25000" value="${libro?.precio || ''}">
              <span class="field-error" id="err-mPrecio"></span>
            </div>
            <div class="input-group">
              <label>Stock *</label>
              <input type="number" id="mStock" min="0" step="1"
                     placeholder="10" value="${libro?.stock ?? ''}">
              <span class="field-error" id="err-mStock"></span>
            </div>
          </div>
          <div class="input-group">
            <label>URL de imagen (portada)</label>
            <input type="url" id="mImagen" placeholder="https://..."
                   value="${escAttr(libro?.imagen_url || '')}">
          </div>
          <div class="input-group">
            <label>Descripción / Sinopsis</label>
            <textarea id="mDescripcion">${escHtml(libro?.descripcion || '')}</textarea>
          </div>

          <div class="modal-actions">
            <button class="btn-cancel" onclick="cerrarModal('modalLibro')">Cancelar</button>
            <button class="btn-save" onclick="guardarLibro()">
              ${libro ? '💾 Guardar cambios' : '✨ Crear libro'}
            </button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
    }

    function cerrarModal(id) {
      const m = document.getElementById(id);
      if (m) m.remove();
    }

    // ── Helpers de validación inline del modal ───────────────────
    function mSetError(id, msg) {
      const el    = document.getElementById(id);
      const errEl = document.getElementById('err-' + id);
      if (el) {
        if (msg) { el.classList.add('invalid'); el.classList.remove('valid'); }
        else     { el.classList.remove('invalid'); el.classList.add('valid'); }
      }
      if (errEl) {
        errEl.textContent = msg;
        msg ? errEl.classList.add('visible') : errEl.classList.remove('visible');
      }
    }

    // ── Guardar (crear o editar) ───────────────────────────────────
    async function guardarLibro() {
      let valid = true;

      const titulo = document.getElementById('mTitulo').value.trim();
      const autor  = document.getElementById('mAutor').value.trim();
      const precio = parseFloat(document.getElementById('mPrecio').value);
      const stock  = parseInt(document.getElementById('mStock').value);
      const fechaPub = document.getElementById('mFechaPub').value;
      const fechaHoy = new Date().toISOString().split('T')[0];

      // Limpiamos el error del ISBN antes de evaluar
      mSetError('mIsbn', '');

      if (!titulo) {
        mSetError('mTitulo', 'El título es obligatorio.'); valid = false;
      } else { mSetError('mTitulo', ''); }

      if (!autor) {
        mSetError('mAutor', 'El autor es obligatorio.'); valid = false;
      } else { mSetError('mAutor', ''); }

      if (isNaN(precio) || precio < 0) {
        mSetError('mPrecio', 'Ingresa un precio válido.'); valid = false;
      } else { mSetError('mPrecio', ''); }

      if (isNaN(stock) || stock < 0) {
        mSetError('mStock', 'Ingresa un stock válido (mínimo 0).'); valid = false;
      } else { mSetError('mStock', ''); }

      if (fechaPub && fechaPub > fechaHoy) {
        mSetError('mFechaPub', 'La fecha de publicación no puede ser en el futuro.'); valid = false;
      } else { 
        mSetError('mFechaPub', ''); 
      }

      if (!valid) {
        const primerError = document.querySelector('#modalLibro .invalid');
        if (primerError) primerError.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }

      const payload = {
        titulo,
        autor,
        editorial:         document.getElementById('mEditorial').value.trim() || null,
        codigo_unico:      document.getElementById('mCodigo').value.trim() || null,
        genero:            document.getElementById('mGenero').value || null,
        idioma:            document.getElementById('mIdioma').value, 
        isbn:              document.getElementById('mIsbn').value.trim() || null,
        numero_paginas:    parseInt(document.getElementById('mPaginas').value) || null,
        fecha_publicacion: fechaPub || null,
        precio,
        stock,
        estado_libro:      document.getElementById('mEstadoLibro').value,
        agotado:           stock === 0,
        imagen_url:        document.getElementById('mImagen').value.trim() || null,
        descripcion:       document.getElementById('mDescripcion').value.trim() || null,
        registrado_por:    sesion?.id || null,
      };

      const btnSave = document.querySelector('#modalLibro .btn-save');
      if (btnSave) setLoading(btnSave, true);

      let error;
      if (editandoId) {
        ({ error } = await client.from('libros').update(payload).eq('id', editandoId));
      } else {
        ({ error } = await client.from('libros').insert([payload]));
      }

      if (btnSave) setLoading(btnSave, false);

      if (error) {
        // LA NUEVA VALIDACIÓN DEL ISBN DUPLICADO
        if (error.code === '23505' && error.message.includes('isbn')) {
          mSetError('mIsbn', 'Ya hay un libro registrado con ese mismo ISBN.');
          document.getElementById('mIsbn').scrollIntoView({ behavior: 'smooth', block: 'center' });
        } else {
          toast('Error: ' + error.message, 'error'); 
        }
        return;
      }

      cerrarModal('modalLibro');
      toast(editandoId ? '✅ Libro actualizado' : '✅ Libro creado', 'success');
      await cargarLibros();
    }

    // ── Confirmar eliminar ────────────────────────────────────────
    function confirmarEliminar(id, titulo) {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.id = 'modalConfirm';
      overlay.innerHTML = `
        <div class="modal-admin modal-confirm">
          <div class="icon">🗑️</div>
          <h3 style="justify-content:center;">Eliminar libro</h3>
          <p>¿Seguro que deseas eliminar <strong>"${escHtml(titulo)}"</strong>?<br>
             Esta acción no se puede deshacer.</p>
          <div class="modal-actions">
            <button class="btn-cancel" onclick="cerrarModal('modalConfirm')">Cancelar</button>
            <button class="btn-danger" onclick="eliminarLibro('${id}')">Sí, eliminar</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
    }

    async function eliminarLibro(id) {
      const { error } = await client.from('libros').delete().eq('id', id);
      cerrarModal('modalConfirm');
      if (error) { toast('Error: ' + error.message, 'error'); return; }
      toast('🗑️ Libro eliminado', 'success');
      await cargarLibros();
    }

    // ── Toast ─────────────────────────────────────────────────────
    function toast(msg, tipo = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className   = `show ${tipo}`;
      setTimeout(() => { t.className = ''; }, 3000);
    }

    // ── Helpers ───────────────────────────────────────────────────
    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function escAttr(str) {
      return String(str).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // ── Init ──────────────────────────────────────────────────────
    cargarLibros();
  </script>
</body>
</html>
