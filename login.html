<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — Librería Pereira</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav>
    <a href="index.html" class="nav-brand">Librería Pereira</a>
    <a href="index.html">Inicio</a>
    <a href="registro.html" class="nav-cta">Registrarse</a>
  </nav>

  <div class="container" style="margin-top: 60px;">

    <div class="form-header">
      <div class="icon">🔐</div>
      <h2>Bienvenido de vuelta</h2>
      <p class="subtitle">Ingresa tus credenciales para acceder</p>
    </div>

    <div id="alertLogin"></div>

    <form onsubmit="simularLogin(event)" novalidate>

      <div class="input-group">
        <label for="userLogin">Usuario o correo electrónico</label>
        <input type="text" id="userLogin" placeholder="juanito_99 o juan@correo.com" required autocomplete="username">
      </div>

      <div class="input-group">
        <label for="passLogin">Contraseña</label>
        <input type="password" id="passLogin" placeholder="••••••••" required autocomplete="current-password">
      </div>

      <div style="text-align: right; margin-top: -10px; margin-bottom: 20px;">
        <a href="recuperar.html" style="font-size: 0.83rem; color: var(--texto-suave);">
          ¿Olvidaste tu contraseña?
        </a>
      </div>

      <!-- CAPTCHA -->
      <div id="captchaLogin" class="captcha-box">
        <div class="captcha-checkbox"></div>
        <span class="captcha-label">No soy un robot</span>
        <span class="captcha-logo">🛡️</span>
      </div>

      <button type="submit">Entrar al sistema →</button>

    </form>

    <div class="divider">o</div>

    <p class="link-muted" style="text-align:center;">
      ¿No tienes cuenta? <a href="registro.html">Regístrate gratis</a>
    </p>

  </div>

  <footer>
    <strong>Librería Pereira</strong> &copy; 2026 · Ley 1581 de 2012
  </footer>

  <script src="js/script.js"></script>
  <script>
    initCaptcha('captchaLogin');
  </script>
</body>
</html>
