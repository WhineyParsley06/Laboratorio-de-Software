<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta — Librería Pereira</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Validación inline por campo ── */
    .field-error {
      display: block;
      font-size: 0.75rem;
      color: #e53e3e;
      margin-top: 4px;
      min-height: 1rem;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .field-error.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .input-group input.invalid,
    .input-group select.invalid {
      border-color: #e53e3e !important;
      background-color: #fff5f5 !important;
      box-shadow: 0 0 0 3px rgba(229,62,62,0.12) !important;
    }
    .input-group input.valid,
    .input-group select.valid {
      border-color: #38a169 !important;
      box-shadow: 0 0 0 3px rgba(56,161,105,0.10) !important;
    }
    #err-captcha,
    #err-aceptaTerminos {
      margin-top: 6px;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-brand">Librería Pereira</a>
    <a href="index.html">Inicio</a>
    <a href="login.html" class="nav-cta">Iniciar sesión</a>
  </nav>

  <div class="container container-wide" style="margin-top: 40px;">

    <div class="form-header">
      <div class="icon">📖</div>
      <h2>Crea tu cuenta</h2>
      <p class="subtitle">Únete a nuestra comunidad y disfruta beneficios exclusivos</p>
    </div>

    <form onsubmit="simularRegistro(event)" novalidate>

      <!-- ── 1. Datos personales ── -->
      <p style="font-size:0.75rem;font-weight:600;color:var(--texto-suave);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px;">
        Datos personales
      </p>

      <div class="input-row">
        <div class="input-group" style="flex:1;">
          <label for="nombre">Nombre(s) *</label>
          <input type="text" id="nombre" placeholder="Juan" required>
          <span class="field-error" id="err-nombre"></span>
        </div>
        <div class="input-group" style="flex:1;">
          <label for="apellidos">Apellidos *</label>
          <input type="text" id="apellidos" placeholder="Pérez García" required>
          <span class="field-error" id="err-apellidos"></span>
        </div>
      </div>

      <div class="input-row">
        <div class="input-group" style="flex:1;">
          <label for="dni">Cédula / DNI *</label>
          <input type="number" id="dni" placeholder="123456789" required>
          <span class="field-error" id="err-dni"></span>
        </div>
        <div class="input-group" style="flex:1;">
          <label for="genero">Género *</label>
          <select id="genero" required>
            <option value="" disabled selected>Seleccionar...</option>
            <option value="masculino">Masculino</option>
            <option value="femenino">Femenino</option>
            <option value="no_binario">No binario</option>
            <option value="prefiero_no_decir">Prefiero no decir</option>
          </select>
          <span class="field-error" id="err-genero"></span>
        </div>
      </div>

      <div class="input-row">
        <div class="input-group" style="flex:1;">
          <label for="fecha_nacimiento">Fecha de nacimiento *</label>
          <input type="date" id="fecha_nacimiento" required>
          <span class="field-error" id="err-fecha_nacimiento"></span>
        </div>
        <div class="input-group" style="flex:1;">
          <label for="dep_residencia">Departamento de residencia *</label>
          <select id="dep_residencia" required onchange="cargarCiudadesReg()">
            <option value="" disabled selected>Seleccionar departamento...</option>
          </select>
          <span class="field-error" id="err-dep_residencia"></span>
        </div>
      </div>

      <div class="input-row">
        <div class="input-group" style="flex:1;">
          <label for="ciudad_residencia">Ciudad de residencia *</label>
          <select id="ciudad_residencia" required disabled>
            <option value="" disabled selected>Primero selecciona un departamento</option>
          </select>
          <span class="field-error" id="err-ciudad_residencia"></span>
        </div>
        <div class="input-group" style="flex:1;">
          <!-- espacio reservado para mantener la grilla -->
        </div>
      </div>

      <!-- ── 2. Contacto ── -->
      <p style="font-size:0.75rem;font-weight:600;color:var(--texto-suave);text-transform:uppercase;letter-spacing:0.06em;margin:20px 0 12px;">
        Contacto y dirección
      </p>

      <div class="input-row">
        <div class="input-group" style="flex:1;">
          <label for="correo">Correo electrónico *</label>
          <input type="email" id="correo" placeholder="juan@correo.com" required>
          <span class="field-error" id="err-correo"></span>
        </div>
        <div class="input-group" style="flex:1;">
          <label for="telefono">Teléfono</label>
          <input type="tel" id="telefono" placeholder="300 123 4567">
          <span class="field-error" id="err-telefono"></span>
        </div>
      </div>

      <div class="input-group">
        <label for="direccion">Dirección de correspondencia / envío *</label>
        <input type="text" id="direccion" placeholder="Calle 123 # 45-67, Pereira, Risaralda" required>
        <span class="field-error" id="err-direccion"></span>
      </div>

      <!-- ── 3. Datos de acceso ── -->
      <p style="font-size:0.75rem;font-weight:600;color:var(--texto-suave);text-transform:uppercase;letter-spacing:0.06em;margin:20px 0 12px;">
        Datos de acceso
      </p>

      <div class="input-group">
        <label for="usuario">Nombre de usuario *</label>
        <input type="text" id="usuario" placeholder="juanito_99" required>
        <span class="field-error" id="err-usuario"></span>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label for="password">Contraseña *</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password">
          <div class="pass-strength"><div class="pass-strength-bar" id="strengthBar"></div></div>
          <p class="pass-hint" id="passHint"></p>
          <span class="field-error" id="err-password"></span>
        </div>
        <div class="input-group">
          <label for="confirmPassword">Confirmar contraseña *</label>
          <input type="password" id="confirmPassword" placeholder="••••••••" required autocomplete="new-password">
          <span class="field-error" id="err-confirmPassword"></span>
        </div>
      </div>

      <!-- CAPTCHA -->
      <div id="captchaReg" class="captcha-box">
        <div class="captcha-checkbox"></div>
        <span class="captcha-label">No soy un robot</span>
        <span class="captcha-logo">🛡️</span>
      </div>
      <span class="field-error" id="err-captcha"></span>

      <!-- Términos -->
      <div style="margin-bottom:24px;">
        <label class="check-label">
          <input type="checkbox" id="aceptaTerminos" required>
          Acepto los <a href="terminos.html" target="_blank">Términos y Condiciones</a>
          y la <a href="terminos.html#datos" target="_blank">Política de Tratamiento de Datos</a>
        </label>
        <span class="field-error" id="err-aceptaTerminos"></span>
      </div>

      <button type="submit">✨ Crear mi cuenta</button>

    </form>

    <p class="link-muted" style="text-align:center; margin-top:20px;">
      ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
    </p>

  </div>

  <footer>
    <strong>Librería Pereira</strong> &copy; 2026 · Ley 1581 de 2012
  </footer>

  <script src="js/script.js"></script>
  <script>
    initCaptcha('captchaReg');
    initPasswordStrength('password', 'strengthBar', 'passHint');

    // ── Utilidades de validación inline ────────────────────────────
    function setError(id, msg) {
      const el = document.getElementById(id);
      const errEl = document.getElementById('err-' + id);
      if (!el || !errEl) return;
      if (msg) {
        el.classList.add('invalid');
        el.classList.remove('valid');
        errEl.textContent = msg;
        errEl.classList.add('visible');
      } else {
        el.classList.remove('invalid');
        el.classList.add('valid');
        errEl.textContent = '';
        errEl.classList.remove('visible');
      }
    }

    function clearError(id) {
      const el = document.getElementById(id);
      const errEl = document.getElementById('err-' + id);
      if (el) { el.classList.remove('invalid', 'valid'); }
      if (errEl) { errEl.textContent = ''; errEl.classList.remove('visible'); }
    }

    function showFieldError(errId, msg) {
      const errEl = document.getElementById(errId);
      if (!errEl) return;
      errEl.textContent = msg;
      errEl.classList.add('visible');
    }

    function hideFieldError(errId) {
      const errEl = document.getElementById(errId);
      if (!errEl) return;
      errEl.textContent = '';
      errEl.classList.remove('visible');
    }

    // ── Filtro en tiempo real: nombre y apellidos (solo letras, tildes y espacios) ──
    ['nombre', 'apellidos'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;

      el.addEventListener('keypress', function (e) {
        // Permitir solo letras (incluye tildes, ñ, ü, etc.) y espacio
        const char = e.key;
        if (char === ' ' || /^[\p{L}]$/u.test(char)) return;
        e.preventDefault();
      });

      el.addEventListener('input', function () {
        // Por si acaso se pega texto: filtrar todo lo que no sea letra o espacio
        const cursor = this.selectionStart;
        const original = this.value;
        const limpio = original.replace(/[^\p{L} ]/gu, '');
        if (limpio !== original) {
          this.value = limpio;
          // Restaurar posición del cursor
          const diff = original.length - limpio.length;
          this.setSelectionRange(cursor - diff, cursor - diff);
        }
        clearError(id);
      });

      el.addEventListener('change', () => clearError(id));
    });

    // Limpiar error al corregir los demás campos
    ['dni','genero','fecha_nacimiento','dep_residencia',
     'ciudad_residencia','correo','telefono','direccion','usuario',
     'password','confirmPassword'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('input', () => clearError(id));
      if (el) el.addEventListener('change', () => clearError(id));
    });

    // ── Validación inline + envío a Supabase ───────────────────────
    async function simularRegistro(e) {
      e.preventDefault();
      let valid = true;

      const v    = id => document.getElementById(id)?.value?.trim();
      const today = new Date();

      // Nombre
      const nombreVal = v('nombre');
      if (!nombreVal) {
        setError('nombre', 'El nombre es obligatorio.');
        valid = false;
      } else if (nombreVal.replace(/\s/g, '').length < 2) {
        setError('nombre', 'El nombre debe tener al menos 2 letras.');
        valid = false;
      } else { setError('nombre', ''); }

      // Apellidos
      const apellidosVal = v('apellidos');
      if (!apellidosVal) {
        setError('apellidos', 'Los apellidos son obligatorios.');
        valid = false;
      } else if (apellidosVal.replace(/\s/g, '').length < 2) {
        setError('apellidos', 'Los apellidos deben tener al menos 2 letras.');
        valid = false;
      } else { setError('apellidos', ''); }

      // DNI
      const dniVal = v('dni');
      if (!dniVal) {
        setError('dni', 'La cédula / DNI es obligatoria.');
        valid = false;
      } else if (!/^\d{5,12}$/.test(dniVal)) {
        setError('dni', 'Ingresa un número de documento válido (5–12 dígitos).');
        valid = false;
      } else { setError('dni', ''); }

      // Género
      if (!v('genero')) {
        setError('genero', 'Selecciona un género.');
        valid = false;
      } else { setError('genero', ''); }

      // Fecha de nacimiento
      const fechaVal = v('fecha_nacimiento');
      if (!fechaVal) {
        setError('fecha_nacimiento', 'La fecha de nacimiento es obligatoria.');
        valid = false;
      } else {
        const nacimiento = new Date(fechaVal);
        const edad = Math.floor((today - nacimiento) / (365.25 * 24 * 60 * 60 * 1000));
        if (edad < 13) {
          setError('fecha_nacimiento', 'Debes tener al menos 13 años para registrarte.');
          valid = false;
        } else if (edad > 120) {
          setError('fecha_nacimiento', 'Ingresa una fecha de nacimiento válida.');
          valid = false;
        } else { setError('fecha_nacimiento', ''); }
      }

      // Departamento
      if (!v('dep_residencia')) {
        setError('dep_residencia', 'Selecciona tu departamento de residencia.');
        valid = false;
      } else { setError('dep_residencia', ''); }

      // Ciudad
      if (!v('ciudad_residencia')) {
        setError('ciudad_residencia', 'Selecciona tu ciudad de residencia.');
        valid = false;
      } else { setError('ciudad_residencia', ''); }

      // Correo
      const correoVal = v('correo');
      if (!correoVal) {
        setError('correo', 'El correo electrónico es obligatorio.');
        valid = false;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(correoVal)) {
        setError('correo', 'Ingresa un correo electrónico válido.');
        valid = false;
      } else { setError('correo', ''); }

      // Teléfono (opcional, pero si se llena debe ser válido)
      const telVal = v('telefono');
      if (telVal && !/^[\d\s\+\-\(\)]{7,15}$/.test(telVal)) {
        setError('telefono', 'Ingresa un número de teléfono válido.');
        valid = false;
      } else { setError('telefono', ''); }

      // Dirección
      if (!v('direccion')) {
        setError('direccion', 'La dirección de envío es obligatoria.');
        valid = false;
      } else { setError('direccion', ''); }

      // Usuario
      const usuarioVal = v('usuario');
      if (!usuarioVal) {
        setError('usuario', 'El nombre de usuario es obligatorio.');
        valid = false;
      } else if (usuarioVal.length < 3) {
        setError('usuario', 'El usuario debe tener al menos 3 caracteres.');
        valid = false;
      } else if (!/^[a-zA-Z0-9_\.]+$/.test(usuarioVal)) {
        setError('usuario', 'Solo se permiten letras, números, guiones bajos y puntos.');
        valid = false;
      } else { setError('usuario', ''); }

      // Contraseña
      const passVal = document.getElementById('password')?.value || '';
      if (!passVal) {
        setError('password', 'La contraseña es obligatoria.');
        valid = false;
      } else if (!isPasswordStrong(passVal)) {
        setError('password', 'Debe tener mínimo 8 caracteres, una mayúscula, un número y un símbolo.');
        valid = false;
      } else { setError('password', ''); }

      // Confirmar contraseña
      const confirmVal = document.getElementById('confirmPassword')?.value || '';
      if (!confirmVal) {
        setError('confirmPassword', 'Confirma tu contraseña.');
        valid = false;
      } else if (confirmVal !== passVal) {
        setError('confirmPassword', 'Las contraseñas no coinciden.');
        valid = false;
      } else { setError('confirmPassword', ''); }

      // CAPTCHA — usa isCaptchaVerified() de script.js (comprueba dataset.verified)
      if (!isCaptchaVerified('captchaReg')) {
        showFieldError('err-captcha', 'Por favor confirma que no eres un robot.');
        valid = false;
      } else { hideFieldError('err-captcha'); }

      // Términos
      const terminos = document.getElementById('aceptaTerminos');
      if (!terminos?.checked) {
        showFieldError('err-aceptaTerminos', 'Debes aceptar los Términos y Condiciones para continuar.');
        valid = false;
      } else { hideFieldError('err-aceptaTerminos'); }

      if (!valid) {
        const primerError = document.querySelector('.invalid, .field-error.visible');
        if (primerError) primerError.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }

      // ── Todo válido → enviar a Supabase ──────────────────────────
      const nombre         = v('nombre');
      const apellidos      = v('apellidos');
      const nombreCompleto = (nombre + ' ' + apellidos).trim();
      const btn            = e.submitter || document.querySelector('button[type="submit"]');

      setLoading(btn, true);

      const datosUsuario = {
        id_dni:            dniVal,
        nombre:            v('nombre'),
        nombre_completo:   nombreCompleto,
        apellidos:         apellidos,
        correo:            correoVal.toLowerCase(),
        fecha_nacimiento:  fechaVal,
        departamento:      v('dep_residencia'),
        ciudad:            v('ciudad_residencia'),
        genero:            v('genero'),
        telefono:          telVal || '',
        direccion:         v('direccion') || 'Pereira, Colombia',
        username:          usuarioVal,
        password:          passVal,
        rol:               'cliente',
        suscripcion_noticias: true,
        notif_catalogo:    true,
        notif_cumple:      true,
      };

      const { data: insertData, error } = await client
        .from('usuarios')
        .insert([datosUsuario])
        .select('id')
        .single();

      if (error) {
        setLoading(btn, false);
        const isDuplicate = error.message.includes('duplicate') || error.message.includes('unique');
        if (isDuplicate) {
          // Intentar detectar qué campo está duplicado
          if (error.message.includes('correo')) {
            setError('correo', 'Este correo ya está registrado.');
          } else if (error.message.includes('username') || error.message.includes('usuario')) {
            setError('usuario', 'Este nombre de usuario ya está en uso.');
          } else if (error.message.includes('dni') || error.message.includes('id_dni')) {
            setError('dni', 'Esta cédula ya está registrada.');
          } else {
            // No se puede determinar cuál — mostrar ambos como posibles
            setError('correo', 'Este correo o usuario ya está registrado.');
            setError('usuario', 'Este correo o usuario ya está registrado.');
          }
          const primerError = document.querySelector('.invalid');
          if (primerError) primerError.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } else {
          showFieldError('err-aceptaTerminos', 'Error al registrar: ' + error.message);
        }
        return;
      }

      // Enviar correo de verificación
      await fetch(`${SUPABASE_URL}/functions/v1/send-verification-email`, {
        method:  'POST',
        headers: {
          'Content-Type':  'application/json',
          'apikey':        SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
        },
        body: JSON.stringify({ usuario_id: insertData.id }),
      });

      setLoading(btn, false);

      sessionStorage.setItem('pendiente_verificacion', JSON.stringify({
        id:     insertData.id,
        correo: datosUsuario.correo,
        nombre: datosUsuario.nombre_completo,
      }));

      setTimeout(() => { window.location.href = 'verificar.html'; }, 1200);
    }
  </script>
  <script>
    initCaptcha('captchaReg');
    initPasswordStrength('password', 'strengthBar', 'passHint');

      "Vaupés": ["Mitú"],

    };

    // Poblar select de departamentos al cargar
    (function poblarDepartamentos() {
      const selDep = document.getElementById('dep_residencia');
      Object.keys(DEPARTAMENTOS_COLOMBIA).sort().forEach(dep => {
        const opt = document.createElement('option');
        opt.value = dep;
        opt.textContent = dep;
        selDep.appendChild(opt);
      });
    })();

    function cargarCiudadesReg() {
      const dep = document.getElementById('dep_residencia').value;
      const selCiudad = document.getElementById('ciudad_residencia');
      selCiudad.innerHTML = '<option value="" disabled selected>Seleccionar ciudad...</option>';
      if (dep && DEPARTAMENTOS_COLOMBIA[dep]) {
        DEPARTAMENTOS_COLOMBIA[dep].forEach(ciudad => {
          const opt = document.createElement('option');
          opt.value = ciudad;
          opt.textContent = ciudad;
          selCiudad.appendChild(opt);
        });
        selCiudad.disabled = false;
      } else {
        selCiudad.disabled = true;
      }
    }
  </script>
</body>
