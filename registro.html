<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Librería</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav>
    <a href="index.html">Inicio</a>
    <a href="registro.html" style="background-color: var(--secundario);">Registro</a>
    <a href="login.html">Login</a>
</nav>

<div class="container">

<h2>Crear Cuenta</h2>

<form id="registroForm">

<div class="input-group">
<label>DNI</label>
<input type="text" id="dni" required>
</div>

<div class="input-group">
<label>Nombres</label>
<input type="text" id="nombres" required>
</div>

<div class="input-group">
<label>Apellidos</label>
<input type="text" id="apellidos" required>
</div>

<div class="input-group">
<label>Fecha de nacimiento</label>
<input type="date" id="fechaNacimiento" required>
</div>

<div class="input-group">
<label>Lugar de nacimiento</label>
<input type="text" id="lugarNacimiento" required>
</div>

<div class="input-group">
<label>Dirección de envío</label>
<input type="text" id="direccion" required>
</div>

<div class="input-group">
<label>Género</label>
<select id="genero">
<option>Masculino</option>
<option>Femenino</option>
<option>Otro</option>
</select>
</div>

<div class="input-group">
<label>Correo electrónico</label>
<input type="email" id="correo" required>
</div>

<div class="input-group">
<label>Usuario</label>
<input type="text" id="usuario" required>
</div>

<div class="input-group">
<label>Contraseña</label>
<input type="password" id="password" required>
</div>

<div class="input-group">
<label>Temas literarios de preferencia</label><br>

<input type="checkbox" value="Fantasia"> Fantasía<br>
<input type="checkbox" value="Ciencia Ficcion"> Ciencia ficción<br>
<input type="checkbox" value="Romance"> Romance<br>
<input type="checkbox" value="Historia"> Historia<br>
<input type="checkbox" value="Tecnologia"> Tecnología
</div>

<div class="input-group">
<label>
<input type="checkbox" id="suscripcion">
Suscribirme a noticias
</label>
</div>

<button type="submit">Registrarme</button>

</form>

</div>

<script src="js/registro.js"></script>

</body>
</html>
