<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta — Librería Pereira</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav>
    <a href="index.html" class="nav-brand">Librería Pereira</a>
    <a href="index.html">Inicio</a>
    <a href="registro.html" class="active">Registro</a>
    <a href="login.html">Iniciar Sesión</a>
  </nav>

  <div class="container container-wide" style="margin-top: 40px;">

    <div class="form-header">
      <div class="icon">📖</div>
      <h2>Crea tu cuenta</h2>
      <p class="subtitle">Únete a nuestra comunidad y disfruta beneficios exclusivos</p>
    </div>

    <div id="alertReg"></div>

    <form onsubmit="simularRegistro(event)" novalidate>

      <!-- Fila 1: Nombre + DNI -->
      <div class="input-row">
        <div class="input-group" style="flex:2;">
          <label for="nombre">Nombre completo *</label>
          <input type="text" id="nombre" placeholder="Juan Pérez" required>
        </div>
        <div class="input-group" style="flex:1;">
          <label for="dni">Cédula / DNI *</label>
          <input type="number" id="dni" placeholder="123456..." required>
        </div>
      </div>

      <!-- Fila 2: Correo + Fecha -->
      <div class="input-row">
        <div class="input-group">
          <label for="correo">Correo electrónico *</label>
          <input type="email" id="correo" placeholder="juan@correo.com" required>
        </div>
        <div class="input-group">
          <label for="fecha_nacimiento">Fecha de nacimiento *</label>
          <input type="date" id="fecha_nacimiento" required>
        </div>
      </div>

      <!-- Fila 3: Usuario + Dirección -->
      <div class="input-row">
        <div class="input-group">
          <label for="usuario">Nombre de usuario *</label>
          <input type="text" id="usuario" placeholder="juanito_99" required>
        </div>
        <div class="input-group">
          <label for="direccion">Dirección de envío</label>
          <input type="text" id="direccion" placeholder="Calle 123, Pereira" value="Pereira, Colombia">
        </div>
      </div>

      <!-- Fila 4: Contraseña + Confirmar -->
      <div class="input-row">
        <div class="input-group">
          <label for="password">Contraseña *</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password">
          <div class="pass-strength"><div class="pass-strength-bar" id="strengthBar"></div></div>
          <p class="pass-hint" id="passHint"></p>
        </div>
        <div class="input-group">
          <label for="confirmPassword">Confirmar contraseña *</label>
          <input type="password" id="confirmPassword" placeholder="••••••••" required autocomplete="new-password">
        </div>
      </div>

      <!-- CAPTCHA -->
      <div id="captchaReg" class="captcha-box">
        <div class="captcha-checkbox"></div>
        <span class="captcha-label">No soy un robot</span>
        <span class="captcha-logo">🛡️</span>
      </div>

      <!-- Términos -->
      <div style="margin-bottom: 24px;">
        <label class="check-label">
          <input type="checkbox" required>
          Acepto los <a href="terminos.html" target="_blank">Términos y Condiciones</a> 
          y la <a href="terminos.html#datos" target="_blank">Política de Tratamiento de Datos</a>
        </label>
      </div>

      <button type="submit">✨ Crear mi cuenta</button>

    </form>

    <p class="link-muted" style="text-align:center; margin-top:20px;">
      ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
    </p>

  </div>

  <footer>
    <strong>Librería Pereira</strong> &copy; 2026 · Ley 1581 de 2012
  </footer>

  <script src="js/script.js"></script>
  <script>
    initCaptcha('captchaReg');
    initPasswordStrength('password', 'strengthBar', 'passHint');
  </script>
</body>
</html>
