<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Librería Pereira</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="css/style.css">
    
    <script src="js/script.js" defer></script>
</head>
<body>
    <nav>
        <a href="index.html">Inicio</a>
        <a href="registro.html" style="background-color: var(--secundario);">Registro</a>
        <a href="login.html">Login</a>
    </nav>
    
    <div class="container" style="max-width: 700px;">
        <h2>Crea tu Cuenta</h2>
        <p style="text-align: center; color: #666; margin-bottom: 20px;">Únete a nuestra comunidad en Pereira y recibe bonos exclusivos.</p>
        
        <form onsubmit="simularRegistro(event)">
            
            <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                <div class="input-group" style="flex: 2; min-width: 250px;">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" placeholder="Ej: Juan Pérez" required>
                </div>
                <div class="input-group" style="flex: 1; min-width: 150px;">
                    <label for="dni">DNI / Cédula</label>
                    <input type="number" id="dni" placeholder="123456..." required>
                </div>
            </div>

            <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                <div class="input-group" style="flex: 1; min-width: 200px;">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" placeholder="juan@correo.com" required>
                </div>
                <div class="input-group" style="flex: 1; min-width: 200px;">
                    <label for="fecha_nacimiento">Fecha de Nacimiento</label>
                    <input type="date" id="fecha_nacimiento" required>
                </div>
            </div>

            <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                <div class="input-group" style="flex: 1; min-width: 200px;">
                    <label for="usuario">Nombre de Usuario</label>
                    <input type="text" id="usuario" placeholder="juanito_99" required>
                </div>
                <div class="input-group" style="flex: 1; min-width: 200px;">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <input type="hidden" id="direccion" value="Pereira, Colombia">

            <div style="margin: 15px 0;">
                <label style="font-weight: normal; font-size: 0.9rem;">
                    <input type="checkbox" required style="width: auto; margin-right: 10px;"> 
                    Acepto los <a href="terminos.html" target="_blank" style="color: var(--primario);">Términos y Condiciones</a>
                </label>
            </div>

            <button type="submit">Finalizar Registro</button>
        </form>
        
        <p style="text-align: center; margin-top: 15px; font-size: 0.9rem;">
            ¿Ya tienes cuenta? <a href="login.html" style="color: var(--primario); font-weight: bold;">Inicia sesión aquí</a>
        </p>
    </div>
</body>
</html>
